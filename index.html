<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Анализ продаж магазина</title>
</head>
<body>
    <h1>Анализ продаж магазина</h1>
<!--По собранным в датасете данным о продажах 
в магазине необходимо составить рейтинг продавцов 
по доходности и рассчитать бонусы для каждого продавца.-->

    <script src="data/dataset_1.js"></script>
    <script src="src/main.js"></script>
    <script>
        try {
            console.log("Входные данные:", data);
    
            // 1. Расчет бонусов с защитой от пустых результатов функций
            const rawBonuses = calculateSpecialBonuses(
                data,
                { calculateProfit: simpleProfit, accumulateMetrics: baseMetrics },
                [
                    bonusBestCustomer,
                    bonusCustomerRetention,
                    bonusLargestSingleSale,
                    bonusHighestAverageProfit,
                    bonusStableGrowth
                ]
            );
    
            // Фильтруем пустые бонусы (если условие не выполнено, функция может вернуть null)
            const specialBonuses = rawBonuses.filter(b => b && b.seller_id !== undefined);
    
            // 2. Получаем базовую статистику
            const stats = baseMetrics(data.purchase_records, simpleProfit, data.products);
    
            // 3. Собираем итоговый рейтинг
            const sellerRating = Object.entries(stats.sellers).map(([id, metrics]) => {
                const sellerId = parseInt(id);
                const sellerInfo = data.sellers.find(s => s.id === sellerId);
                
                // Считаем бонусы для конкретного продавца (безопасно)
                const sellerBonusesValue = specialBonuses
                    .filter(b => b.seller_id === sellerId)
                    .reduce((sum, b) => sum + (Number(b.bonus) || 0), 0);
    
                return {
                    id: sellerId,
                    name: sellerInfo ? sellerInfo.name : `Seller ${sellerId}`,
                    profit: Number(metrics.profit.toFixed(2)),
                    bonuses: Number(sellerBonusesValue.toFixed(2)),
                    total: Number((metrics.profit + sellerBonusesValue).toFixed(2))
                };
            }).sort((a, b) => b.total - a.total);
    
            // ВЫВОД РЕЗУЛЬТАТОВ (важно для логов CI/CD)
            console.log("Special Bonuses Table:");
            console.table(specialBonuses);
    
            console.log("Final Profit Rating:");
            console.table(sellerRating);
    
            // Экспортируем для автотестов репозитория
            window.specialBonuses = specialBonuses;
            window.sellerRating = sellerRating;
    
        } catch (err) {
            console.error("Ошибка в логике расчетов:", err.message);
            // Выбрасываем ошибку, чтобы CI/CD зафиксировал падение, если оно реально
            throw err;
        }
    </script>
    
</body>
</html>
