        function calculateSimpleRevenue(purchase, _product) {
            const discountRatio = 1 - (purchase.discount / 100);
            return purchase.sale_price * purchase.quantity * discountRatio;
        }

        function calculateBonusByProfit(index, total, seller) {
            const { profit } = seller;
            if (index === 0) return +(profit * 0.15).toFixed(2);
            if (index === 1 || index === 2) return +(profit * 0.10).toFixed(2);
            if (index === total - 1) return 0;
            return +(profit * 0.05).toFixed(2);
        }
