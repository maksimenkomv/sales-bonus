<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Анализ продаж магазина</title>
</head>
<body>
    <h1>Анализ продаж магазина</h1>
<!--По собранным в датасете данным о продажах 
в магазине необходимо составить рейтинг продавцов 
по доходности и рассчитать бонусы для каждого продавца.-->

    <script src="data/dataset_1.js"></script>
    <script src="src/main.js"></script>
    <script>
        console.log("Исходные данные:", data);
    
        try {
            // 1. Предварительный расчет базовых метрик
            const stats = baseMetrics(data.purchase_records, simpleProfit, data.products);
    
            // 2. Вычисление бонусов по специальным условиям
            const specialBonuses = calculateSpecialBonuses(
                data,
                {
                    calculateProfit: simpleProfit,
                    accumulateMetrics: baseMetrics,
                },
                [
                    bonusBestCustomer,
                    bonusCustomerRetention,
                    bonusLargestSingleSale,
                    bonusHighestAverageProfit,
                    bonusStableGrowth
                ]
            );
    
            // 3. Формирование итогового рейтинга по доходности
            const sellerRating = Object.entries(stats.sellers).map(([id, metrics]) => {
                const sellerId = parseInt(id);
                const sellerInfo = data.sellers.find(s => s.id === sellerId);
                
                // Фильтруем бонусы для текущего продавца и суммируем их
                const currentSellerBonuses = specialBonuses.filter(b => b && b.seller_id === sellerId);
                const totalBonusValue = currentSellerBonuses.reduce((sum, b) => sum + (Number(b.bonus) || 0), 0);
    
                return {
                    "ID": sellerId,
                    "Продавец": sellerInfo ? sellerInfo.name : `ID: ${sellerId}`,
                    "Чистая прибыль": +metrics.profit.toFixed(2),
                    "Сумма бонусов": +totalBonusValue.toFixed(2),
                    "Итоговый доход": +(metrics.profit + totalBonusValue).toFixed(2),
                    "Кол-во чеков": metrics.items.length
                };
            }).sort((a, b) => b["Итоговый доход"] - a["Итоговый доход"]);
    
            // 4. Вывод результатов
            console.log("Расчитанные бонусы:");
            console.table(specialBonuses);
    
            console.log("Рейтинг продавцов по доходности (Прибыль + Бонусы):");
            console.table(sellerRating);
    
            // Сохраняем результат в глобальную область для тестов, если нужно
            window.finalSellerRating = sellerRating;
    
        } catch (error) {
            console.error("Ошибка при расчете рейтинга:", error.message);
            // Выбрасываем ошибку для корректной остановки автотестов в CI
            throw error;
        }
    </script>
    
</body>
</html>
